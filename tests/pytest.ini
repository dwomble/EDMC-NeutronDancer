[pytest]
markers =
    live_requests: run the harness with the live requests backend
    slow: tests that take a long time so should not be run by an automation
    overlay: enable or disable overlay mode for the test. Use as @pytest.mark.overlay('Legacy') or @pytest.mark.overlay('Modern') to enable overlay mode, or @pytest.mark.overlay('None') to disable overlay mode.
    manual_only: tests that should not be run in the github automated testing